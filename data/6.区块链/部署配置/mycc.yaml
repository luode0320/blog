version: '3'

services:
  #合约容器
  chaincode:
    #定义主机名
    container_name: chaincode_server
    #使用的镜像
    image: chaincode/mycc:1.0
    #容器的映射端口
    ports:
      - 9999:9999
    #环境变量
    # privileged: true
    environment:
      - CHAINCODE_ID=${CHAINCODE_ID}
      - CHAINCODE_SERVER_ADDRESS=mycc.server.com:9999
    volumes:
      - /etc/hosts:/etc/hosts
    #command: sleep infinity
