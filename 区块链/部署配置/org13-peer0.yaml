version: '3'

#全局替换下面的k-v的value
#dns: luode.com
#node: peer0
#couchdbport: 5985
#peerport: 7150
#peerport2: 7250
#cliport: 9080
#mspid: Org13MSP
#org: org13

#networks:
#    fabric_net:
#        external: true

services:
    couchdb.peer0.org13.luode.com:
        container_name: couchdb.peer0.org13.luode.com
        image: n.cndtcloud.com/trusted-chain/cndtcloud/couchdb:3.3.2
#        networks:
#            - fabric_net
        environment:
            - COUCHDB_USER=admin
            - COUCHDB_PASSWORD=adminpw
            - COUCHDB_CLUSTERED=true
            - COUCHDB_LOG_LEVEL=error
        ports:
            - 5985:5984
        volumes:
            - /etc/localtime:/etc/localtime

    peer0.org13.luode.com:
        container_name: peer0.org13.luode.com
        image: n.cndtcloud.com/trusted-chain/xinhe/xinhe-peer:2.4.6
#        networks:
#            - fabric_net
        environment:
            - CORE_PEER_GOSSIP_STATE_ENABLED=true
            - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
            - CORE_PEER_ID=peer0.org13.luode.com
            - CORE_PEER_ADDRESS=peer0.org13.luode.com:7150
            - CORE_PEER_LISTENADDRESS=0.0.0.0:7150
            - CORE_PEER_CHAINCODEADDRESS=127.0.0.1:7250
            - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7250
            - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org13.luode.com:7150
            - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org13.luode.com:7150
            - CORE_PEER_LOCALMSPID=Org13MSP
            - FABRIC_LOGGING_SPEC=INFO
            - CORE_PEER_TLS_ENABLED=true
            - CORE_PEER_GOSSIP_USELEADERELECTION=true
            - CORE_PEER_GOSSIP_ORGLEADER=false
            - CORE_PEER_PROFILE_ENABLED=true
            - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
            - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
            - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
            - CORE_CHAINCODE_EXECUTETIMEOUT=300s
            - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
            - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.peer0.org13.luode.com:5984
            - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
            - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
              # metrics
              #- CORE_OPERATIONS_LISTENADDRESS=peer0.org13.luode.com:8125
              #- CORE_METRICS_PROVIDER=statsd
              #- CORE_METRICS_STATSD_ADDRESS=graphite:8125
              # - CORE_METRICS_STATSD_NETWORK=udp
              # - CORE_METRICS_STATSD_PREFIX=peer0_org13
        depends_on:
            - couchdb.peer0.org13.luode.com
        working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
        command: peer node start
        volumes:
            - /etc/localtime:/etc/localtime
            - /var/run/:/host/var/run/
            - ./crypto-config/peerOrganizations/org13.luode.com/peers/peer0.org13.luode.com/msp:/etc/hyperledger/fabric/msp
            - ./crypto-config/peerOrganizations/org13.luode.com/peers/peer0.org13.luode.com/tls:/etc/hyperledger/fabric/tls
            - ./hyperledger/peer0.org13:/var/hyperledger/paoauction
        ports:
            - 7150:7150
            - 7250:7250
#        extra_hosts:
#            - "orderer0.xinhe.com:192.168.1.78"
#            - "orderer1.xinhe.com:192.168.1.78"
#            - "orderer2.xinhe.com:192.168.1.78"
            
    cli-org13-peer0:
        container_name: cli-org13-peer0
        image: n.cndtcloud.com/trusted-chain/xinhe/xinhe-tools:2.4.6
        #        networks:
        #            - fabric_net
        tty: true
        stdin_open: true
        environment:
            - GOPATH=/opt/gopath
            - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
            - FABRIC_LOGGING_SPEC=INFO
            - CORE_PEER_ID=cli
            - CORE_PEER_ADDRESS=peer0.org13.luode.com:7150
            - CORE_PEER_LOCALMSPID=Org13MSP
            - CORE_PEER_TLS_ENABLED=true
            - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org13.luode.com/peers/peer0.org13.luode.com/tls/server.crt
            - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org13.luode.com/peers/peer0.org13.luode.com/tls/server.key
            - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org13.luode.com/peers/peer0.org13.luode.com/tls/ca.crt
            - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org13.luode.com/users/Admin@org13.luode.com/msp
        working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
        command: sh -c "/usr/local/bin/configtxlator start --port=9080"
        volumes:
            - /etc/localtime:/etc/localtime
            - /var/run/:/host/var/run/
            - ./chaincode/go/:/opt/gopath/src/github.com/hyperledger/fabric-cluster/chaincode/go/
            - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/
            - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
        ports:
            - 9080:9080
#        extra_hosts:
#            - "orderer0.xinhe.com:192.168.1.78"
#            - "orderer1.xinhe.com:192.168.1.78"
#            - "orderer2.xinhe.com:192.168.1.78"