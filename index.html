<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <title>探索之旅</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="./Static/vue.css">
    <link rel="stylesheet" href="./Static/gitalk.css">
    <!-- <meta name="referrer" content="no-referrer"> -->
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="//www.googletagmanager.com/gtag/js?id=G-57PHBXT1C5"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag("js", new Date());
        gtag("config", "G-57PHBXT1C5");
    </script>
</head>

<body>
    <div id="app">Please wait...</div>
    <script>
        window.$docsify = {
            repo: "https://github.com/Rod0320/blog",
            loadSidebar: true,
            auto2top: true,
            themeColor: "#42b983",
            subMaxLevel: 3,
            search: {
                paths: "auto",
                placeholder: "搜索...",
                noData: "找不到结果",
                depth: 1,
            },
            // 入口文件改为 /home.md
            homepage: '/HOME.md',
            alias: {
                "/.*/_sidebar.md": "https://raw.githubusercontent.com/Rod0320/blog/main/_sidebar.md"
            },
            plugins: [],
            requestHeaders: {
                // "cache-control": "no-cache",
            },
            count:{
                countable:true,
                fontsize:'0.9em',
                color:'rgb(90,90,90)',
                language:'chinese'
            }
        }
    </script>
    <script src="./Static/docsify.min.js"></script>
    <script src="./Static/search.min.js"></script>
    <script src="./Static/catalog.js"></script>
    <script src="./Static/sidebar.js"></script>
    <script src="./Static/docsify-copy-code@2.1.1.js"></script>
    <script src="./Static/docsify-pagination.min.js"></script>
    <script src="./Static/countable.js"></script>
    <script src="./Static/gitalk.min.js"></script>
    <script src="./Static/blueimp-md5@2.19.0.js"></script>
</body>

</html>
